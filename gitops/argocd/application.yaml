apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: student-analytics-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/OrzaYevhenii/open-data-ai-analytics-Orza.git
    targetRevision: HEAD
    path: gitops/app
  destination:
    server: https://kubernetes.default.svc
    namespace: student-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
