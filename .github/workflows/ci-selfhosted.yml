name: CI (Analytics)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      module:
        description: "Який файл запустити (або 'all')"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - 01_quality_check
          - 02_research
          - 03_viz

jobs:
  run-analytics:
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        module: [01_quality_check, 02_research, 03_viz]

    steps:
      - name: Checkout repository
        # Перенесли if сюди, на кожен крок
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.module == 'all' || github.event.inputs.module == matrix.module }}
        uses: actions/checkout@v4

      - name: Set up Python
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.module == 'all' || github.event.inputs.module == matrix.module }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.module == 'all' || github.event.inputs.module == matrix.module }}
        run: |
          python -m pip install --upgrade pip
          pip install pandas jupyter nbconvert

      - name: Run analysis files
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.module == 'all' || github.event.inputs.module == matrix.module }}
        run: |
          mkdir -p artifacts/${{ matrix.module }}
          echo "Запускаємо ${{ matrix.module }}..."
          
          if [ -f "notebooks/${{ matrix.module }}.ipynb" ]; then
            jupyter nbconvert --to notebook --execute "notebooks/${{ matrix.module }}.ipynb" --output-dir "artifacts/${{ matrix.module }}"
          elif [ -f "notebooks/${{ matrix.module }}.ipynb.py" ]; then
            python "notebooks/${{ matrix.module }}.ipynb.py" > "artifacts/${{ matrix.module }}/run.log" 2>&1
          else
            echo "Файл ${{ matrix.module }} не знайдено!"
          fi

      - name: Upload artifacts
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.module == 'all' || github.event.inputs.module == matrix.module }}
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.module }}
          path: artifacts/${{ matrix.module }}