#cloud-config
package_upgrade: true

packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - lsb-release
  - git
  - docker.io
  - docker-compose-v2

runcmd:
  # Налаштування Docker
  - systemctl start docker
  - systemctl enable docker
  - usermod -aG docker azureuser
  
  # Підготовка директорії та клонування ВАШОГО репозиторію
  - mkdir -p /home/azureuser/app
  # ПРИМІТКА: Замініть URL нижче на ваш реальний GitHub URL після створення репозиторію
  - git clone https://github.com/EvheniiOrza/open-data-ai-analytics-Orza.git /home/azureuser/app
  - cd /home/azureuser/app
  
  # Створення файлу .env для вашого compose.yaml
  - echo "POSTGRES_USER=admin" > .env
  - echo "POSTGRES_PASSWORD=password123" >> .env
  - echo "POSTGRES_DB=analytics" >> .env
  - echo "DATABASE_URL=postgresql://admin:password123@db:5432/analytics" >> .env
  
  # Створення мережі, якщо вона ще не створена
  - docker network create app_network || true
  
  # Запуск ВАШОГО проекту та моніторингу
  - docker compose -f compose.yaml -f monitoring/docker-compose.monitoring.yml up -d --build
